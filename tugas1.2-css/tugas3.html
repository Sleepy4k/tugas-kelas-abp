<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Wireframe Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <style>
      .box-gray {
        background-color: #7f7f7f;
        min-height: 100px;
      }
    </style>
  </head>
  <body class="py-4">
    <div
      class="container border border-dark p-4 bg-white"
      style="max-width: 800px"
    >
      <div class="row mb-4">
        <div class="col-3">
          <div
            class="border border-dark d-flex align-items-center justify-content-center"
            style="min-height: 100px"
          >
            <h5 class="m-0">Logo</h5>
          </div>
        </div>
        <div class="col-9">
          <div class="box-gray h-100"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-3">
          <div
            class="border border-dark d-flex align-items-center justify-content-center"
            style="min-height: 350px"
          >
            <h5 class="m-0">Navigasi</h5>
          </div>
        </div>

        <div class="col-9">
          <div class="mb-4">
            <div class="border border-dark mb-2" style="height: 20px"></div>
            <div class="border border-dark mb-2" style="height: 20px"></div>
            <div class="border border-dark mb-2" style="height: 20px"></div>
            <div class="border border-dark mb-2" style="height: 20px"></div>
          </div>

          <div class="row">
            <div class="col-7">
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
              <div class="border border-dark mb-2" style="height: 20px"></div>
            </div>
            <div class="col-5">
              <div class="box-gray" style="height: 150px"></div>
            </div>
          </div>
        </div>
      </div>

      <hr class="border border-dark border-2 opacity-100 my-4" />
    </div>
  </body>
</html>
